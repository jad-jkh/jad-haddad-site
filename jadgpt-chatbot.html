<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JadGPT - AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #9945FF;
            --accent-pink: #FF6EC7;
            --accent-yellow: #FFD700;
            --dark-navy: #2C3E50;
            --darker-navy: #1a252f;
            --bg-light: #ecf0f1;
            --text-dark: #2c3e50;
            --text-light: #ecf0f1;
            --border-thick: #000;
            --success: #00ff41;
        }

        body {
            font-family: 'VT323', monospace;
            background: transparent;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* Chat Container */
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: white;
            border: 6px solid var(--border-thick);
            box-shadow: 12px 12px 0px var(--border-thick);
            display: flex;
            flex-direction: column;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9998;
            transform-origin: bottom right;
            animation: expandFromButton 0.25s ease-out forwards;
        }

        .chat-container.closing {
            animation: collapseToButton 0.25s ease-in forwards;
        }

        @keyframes expandFromButton {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes collapseToButton {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary-purple) 0%, var(--accent-pink) 100%);
            padding: 20px;
            border-bottom: 6px solid var(--border-thick);
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            color: white;
            text-shadow: 3px 3px 0px var(--border-thick);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .chat-header p {
            font-size: 18px;
            color: white;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
        }

        .close-button {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: white;
            border: 3px solid var(--border-thick);
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text-dark);
        }

        .close-button:hover {
            background: var(--accent-yellow);
            transform: rotate(90deg);
        }

        /* Navigation Menu */
        .nav-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
            background: var(--bg-light);
            border-bottom: 4px solid var(--border-thick);
        }

        .nav-button {
            background: white;
            border: 4px solid var(--border-thick);
            padding: 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 4px 4px 0px var(--border-thick);
            color: var(--text-dark);
            text-align: center;
            line-height: 1.4;
        }

        .nav-button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-thick);
            background: var(--accent-yellow);
        }

        .nav-button:active {
            transform: translate(1px, 1px);
            box-shadow: 3px 3px 0px var(--border-thick);
        }

        .nav-button.active {
            background: var(--primary-purple);
            color: white;
        }

        /* Sub Menu */
        .sub-menu {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(153, 69, 255, 0.1);
            border-bottom: 4px solid var(--border-thick);
        }

        .sub-menu.active {
            display: flex;
        }

        .sub-menu-button {
            background: white;
            border: 3px solid var(--border-thick);
            padding: 8px 12px;
            font-family: 'VT323', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 3px 3px 0px var(--border-thick);
            color: var(--text-dark);
            text-align: left;
        }

        .sub-menu-button:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px var(--border-thick);
            background: var(--accent-yellow);
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: white;
        }

        .chat-messages::-webkit-scrollbar {
            width: 10px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: var(--bg-light);
            border-left: 3px solid var(--border-thick);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--primary-purple);
            border: 2px solid var(--border-thick);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 12px;
            animation: messageSlide 0.2s ease-out;
            max-width: 90%;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border: 3px solid var(--border-thick);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            background: white;
            box-shadow: 3px 3px 0px var(--border-thick);
        }

        .message.user .message-avatar {
            background: var(--accent-yellow);
            color: var(--text-dark);
        }

        .message.assistant .message-avatar {
            background-color: var(--primary-purple);
            background-image: url('/images/AI_pixel_floating.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            color: transparent;
        }

        .message-content {
            background: white;
            padding: 12px 14px;
            border: 3px solid var(--border-thick);
            box-shadow: 3px 3px 0px var(--border-thick);
            font-size: 18px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: var(--bg-light);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 8px;
            padding: 12px;
        }

        .typing-dot {
            width: 10px;
            height: 10px;
            background: var(--primary-purple);
            border: 2px solid var(--border-thick);
            animation: typing 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Input Area */
        .chat-input-container {
            padding: 16px;
            background: var(--dark-navy);
            border-top: 6px solid var(--border-thick);
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            background: white;
            border: 3px solid var(--border-thick);
            padding: 12px 14px;
            color: var(--text-dark);
            font-family: 'VT323', monospace;
            font-size: 18px;
            outline: none;
        }

        .chat-input:focus {
            box-shadow: 0 0 0 3px var(--primary-purple);
        }

        .send-button {
            background: var(--accent-yellow);
            border: 3px solid var(--border-thick);
            color: var(--text-dark);
            padding: 12px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 3px 3px 0px var(--border-thick);
            font-weight: bold;
        }

        .send-button:hover:not(:disabled) {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0px var(--border-thick);
            background: var(--primary-purple);
            color: white;
        }

        .send-button:active:not(:disabled) {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px var(--border-thick);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            padding: 24px 16px;
        }

        .welcome-message h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            margin-bottom: 16px;
            color: var(--primary-purple);
            line-height: 1.5;
        }

        .welcome-message p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        /* Error Message */
        .error-message {
            background: #ffebee;
            border: 3px solid #c62828;
            padding: 12px;
            margin: 12px 0;
            font-size: 16px;
            color: #c62828;
            box-shadow: 3px 3px 0px var(--border-thick);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .chat-container {
                width: calc(100vw - 20px);
                height: 70vh;
                max-width: calc(100vw - 20px);
                bottom: 10px;
                right: 10px;
                border: 4px solid var(--border-thick);
                box-shadow: 8px 8px 0px var(--border-thick);
            }

            .chat-header {
                padding: 16px;
            }

            .chat-header h1 {
                font-size: 18px;
            }

            .chat-header p {
                font-size: 14px;
            }

            .nav-button {
                font-size: 10px;
                padding: 10px 8px;
            }

            .message-content {
                font-size: 16px;
            }

            .send-button {
                padding: 12px 16px;
                font-size: 10px;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <button class="close-button" id="closeButton" onclick="closeChat()">✕</button>
            <h1>JadGPT</h1>
            <p>AI Portfolio Assistant</p>
        </div>

        <!-- Navigation Menu -->
        <div class="nav-menu">
            <button class="nav-button" onclick="handleNavClick('education', event)">EDUCATION</button>
            <button class="nav-button" onclick="handleNavClick('projects', event)">PROJECTS</button>
            <button class="nav-button" onclick="handleNavClick('leadership', event)">LEADERSHIP</button>
            <button class="nav-button" onclick="handleNavClick('skills', event)">SKILLS</button>
        </div>

        <!-- Sub Menus -->
        <div class="sub-menu" id="projectsSubMenu">
            <button class="sub-menu-button" onclick="askAbout('Tell me about Smart Table Solutions')">Smart Table Solutions</button>
            <button class="sub-menu-button" onclick="askAbout('Tell me about SoilSense')">SoilSense</button>
            <button class="sub-menu-button" onclick="askAbout('Tell me about Wi-Fi Desk Buddy')">Wi-Fi Desk Buddy</button>
        </div>

        <div class="sub-menu" id="leadershipSubMenu">
            <button class="sub-menu-button" onclick="askAbout('Tell me about IEEE-TAMU')">Institute of Electrical and Electronics Engineers</button>
            <button class="sub-menu-button" onclick="askAbout('Tell me about FEAST')">Freshmen Exemplifying Aggie Spirit Together</button>
            <button class="sub-menu-button" onclick="askAbout('Tell me about PAID')">Professional Association of Industrial Distribution</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>SYSTEM ONLINE</h2>
                <p>Hi! I'm JadGPT 👋</p>
                <p>Use the buttons above to explore Jad's background, or ask me anything!</p>
            </div>
        </div>

        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="userInput" 
                placeholder="Ask me anything..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-button" id="sendButton" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>

        
        // ============================================
        // ANALYTICS CONFIGURATION
        // ============================================
        // Replace this URL with your Google Apps Script web app URL
        const ANALYTICS_URL = 'https://script.google.com/macros/s/AKfycbzFl5QQslMwUgJzKGL3icLkDIABxUh3XKSliwAcE49QMsb38ZhF1Rx9eZWIQMdLG9prGw/exec';
        
        // Generate a unique session ID for this chat session
        const SESSION_ID = Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        // Function to log conversation to Google Sheets
        async function logConversation(question, answer) {
            try {
                await fetch(ANALYTICS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Important for Google Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        answer: answer,
                        sessionId: SESSION_ID,
                        timestamp: new Date().toISOString()
                    })
                });
                console.log('Analytics logged successfully');
            } catch (error) {
                console.error('Failed to log analytics:', error);
                // Don't show error to user - analytics failure shouldn't break the chat
            }
        }

        
        // ============================================

        const RESUME_DATA = `
Name: Jad Haddad
Contact: jadkh6@gmail.com | +1-972-469-0231 | linkedin.com/in/jadksrahaddad
Status: U.S. Citizen

EDUCATION:
- Bachelor of Science in Electronic Systems Engineering at Texas A&M University
- GPA: 3.4
- Expected Graduation: December 2027
- Relevant Coursework: Electromagnetics & High Frequency Systems, Local & Metro Networks, Power Systems & Circuit Application, C/C++ for Microcontrollers, Product Development

EXPERIENCE & PROJECTS:

1. Smart Table Solutions - Custom Standing Desks (May 2025 - Jul 2025)
   - Founder, Self-Employed Electrical Engineer in Plano, Texas

   - Developed control for 12V DC geared lift motor with optional add-ons (LED lighting, stored height presets, different motor speed options)
   - Designed modular PCB in KiCad, validated in Multisim

2. SoilSense - Soil Moisture & Automated Irrigation (Apr 2025 - Jul 2025)

   - Personal Project in College Station, Texas
   - Built Wi-Fi-synced LED clock on Raspberry Pi Pico 2 W using NTP
   - Implemented on-device settings for 12/24-hour formats and RGB color control
   - Developed Pomodoro focus timer with visual alerts

LEADERSHIP & INVOLVEMENT:

- IEEE-TAMU Member (Dec 2025 - Present)
  * Applied workshop skills in Keil µVision and KiCad to personal projects
  * Participate in technical seminars, design competitions, and networking events

- FEAST Mentor (Aug 2023 - Present)
  * Mentored 5 freshmen through academic, social, and organizational integration
  * Coordinated event logistics and $8,000 semester budget for 96 peers

- PAID Member (Dec 2025 - Present)
  * Explore industrial distribution and supply chain principles
  * Engage in workshops and networking events

TECHNICAL SKILLS:
- Microcontrollers: STM32, Arduino, Raspberry Pi Pico
- PCB Design: KiCad
- Electronics: Analog/Digital (ADC/DAC, PWM), Interfaces (UART, I2C, SPI), Motor/LED control
- Programming: C/C++, Python, Java, Bash, HTML, MATLAB
- Software: Wireshark, Quartus, Excel, Keil µVision

CERTIFICATIONS:

- Cloud Computing Fundamentals (LinkedIn Learning)
`;

        const messagesContainer = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        let conversationHistory = [];
        let currentSubMenu = null;

        // Configuration for widget mode
        document.body.style.background = 'transparent';

        function closeChat() {
            const container = document.getElementById('chatContainer');
            container.classList.add('closing');
            
            setTimeout(() => {
                container.style.display = 'none';
                container.classList.remove('closing');
                window.parent.postMessage('closeChat', '*');
            }, 250);
        }

        function openChat() {
            const container = document.getElementById('chatContainer');
            container.style.display = 'flex';
        }

        window.addEventListener('message', function(event) {
            if (event.data === 'openChat') {
                openChat();
            }
        });

        function handleNavClick(category, event) {
            // Hide all sub menus first
            document.querySelectorAll('.sub-menu').forEach(menu => {
                menu.classList.remove('active');
            });

            // Remove active state from all nav buttons
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Handle category-specific logic
            if (category === 'projects') {
                document.getElementById('projectsSubMenu').classList.add('active');
                event.target.classList.add('active');
                currentSubMenu = 'projects';
            } else if (category === 'leadership') {
                document.getElementById('leadershipSubMenu').classList.add('active');
                event.target.classList.add('active');
                currentSubMenu = 'leadership';
            } else {
                currentSubMenu = null;
                // Ask about the category directly
                if (category === 'education') {
                    askAbout('Tell me about Jad\'s education at Texas A&M');
                } else if (category === 'skills') {
                    askAbout('What are Jad\'s technical skills and certifications?');
                }
            }
        }

        function askAbout(question) {
            // Close all sub-menus when a question is asked
            document.querySelectorAll('.sub-menu').forEach(menu => {
                menu.classList.remove('active');
            });
            
            // Remove active state from all nav buttons
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            currentSubMenu = null;
            
            userInput.value = question;
            sendMessage();
        }

        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = isUser ? 'U' : 'J';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = 'J';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            contentDiv.appendChild(indicator);
            typingDiv.appendChild(avatar);
            typingDiv.appendChild(contentDiv);
            messagesContainer.appendChild(typingDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typing-indicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '⚠ ' + message;
            messagesContainer.appendChild(errorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Simple rule-based chatbot (no API needed)
        function getAIResponse(userMessage) {
            const msg = userMessage.toLowerCase();
            
            // Education responses
            if (msg.includes('education') || msg.includes('school') || msg.includes('university') || msg.includes('texas a&m')
                || msg.includes('eset') || msg.includes('major') || msg.includes('studying') || msg.includes('study')
               ) {
                return "Jad is pursuing a Bachelor of Science in Electronic Systems Engineering at Texas A&M University with a 3.4 GPA, graduating in December 2027. His coursework includes Electromagnetics, C/C++ for Microcontrollers, and Power Systems!";
            }
            
            // Smart Table Solutions
            if (msg.includes('smart table') || msg.includes('standing desk') || msg.includes('experience')) {
                return "Smart Table Solutions was awesome! Jad built and sold 8 STM32-based smart standing desks, generating ~$2,400. Features included motor control, LED lighting, height presets, and custom PCB design in KiCad. Super cool embedded project!";

            }
            
            // Wi-Fi Desk Buddy

            // IEEE

            // FEAST
            if (msg.includes('feast') || msg.includes('mentor') ) {
                return "Since joining in August 2023, Jad served as a Special Events Committee member and is a current FEAST Mentor. He has mentored a total of 10 freshmen through their transition to college and coordinated events plus an $8,000 semester budget for 96 peers. Leadership and community building at its finest!";
            }
            
            // PAID
            if (msg.includes('paid') || msg.includes('industrial distribution')) {
                return "Jad joined PAID in December 2025 to explore industrial distribution and supply chain principles through workshops and networking events. Expanding beyond pure engineering!";
            }
            
            // Skills
            if (msg.includes('skill') || msg.includes('program') || msg.includes('software')) {
                return "Jad's tech stack is impressive! Microcontrollers: STM32, Arduino, Raspberry Pi Pico. Programming: C/C++, Python, Java, Bash, HTML, MATLAB. PCB design in KiCad, plus experience with Wireshark, Quartus, and Keil µVision. He's also got Lean Six Sigma Yellow Belt certified!";
            }
            
            // Contact
            if (msg.includes('contact') || msg.includes('linkedin') || msg.includes('email') || msg.includes('phone') || msg.includes('linked') || msg.includes('reach')) {
                return "You can reach Jad at jadkh6@gmail.com, call/text +1-972-469-0231, or connect on LinkedIn at linkedin.com/in/jadksrahaddad. He's ready to chat!";
            }
            
            // Projects general
            if (msg.includes('project')) {
                return "Jad has three awesome projects: Smart Table Solutions (STM32 standing desks), SoilSense (Arduino irrigation), and Wi-Fi Desk Buddy (Raspberry Pi Pico clock). Want to know more about any of these?";
            }
            
            // Leadership general
            if (msg.includes('leadership') || msg.includes('involvement') || msg.includes('org') || msg.includes('organization')) {
                return "Jad is involved in IEEE-TAMU, FEAST mentoring, and PAID. He's passionate about helping others and building technical + leadership skills. Which organization interests you?";
            }
            
            // Greetings
            if (msg.includes('hi') || msg.includes('hello') || msg.includes('hey') || msg==('sup') ){
                return "Hey there! 👋 I'm JadGPT, here to tell you all about Jad's engineering projects, education, and experience. What would you like to know?";
            }
            
            // Default response
            return "I'm not sure how to answer that directly. For any specific questions, you can reach out to Jad via email at jadkh6@gmail.com – he'll be happy to help!";
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;

            // Remove welcome message if it exists
            const welcomeMsg = document.querySelector('.welcome-message');
            if (welcomeMsg) welcomeMsg.remove();

            addMessage(message, true);
            
            userInput.value = '';
            sendButton.disabled = true;
            userInput.disabled = true;
            
            showTypingIndicator();

            // Simulate thinking delay
            setTimeout(async () => {
                const response = getAIResponse(message);
                removeTypingIndicator();
                addMessage(response, false);
                
                // Log to analytics (non-blocking)
                logConversation(message, response);
                
                sendButton.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }, 800);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Auto-focus input
        setTimeout(() => {
            document.getElementById('userInput').focus();
        }, 300);
    </script>
</body>
</html>
