  <body>
    <div id="root"></div>

    <!-- JadGPT Chat Widget -->
      <iframe 
          id="jadgpt-widget"
          src="/jadgpt-chatbot.html?widget=true" 
          style="position: fixed; bottom: 0; right: 0; width: 100%; height: 100%; border: none; pointer-events: none; z-index: 9999; display: none;"
      ></iframe>
  
      <style>



          
          .jadgpt-chat-button {
              position: fixed;
              bottom: 30px;
              right: 30px;
              width: 70px;
              height: 70px;
              background: linear-gradient(135deg, #9945FF 0%, #FF6EC7 100%);
              border: 4px solid #000;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 32px;
              color: white;
              box-shadow: 6px 6px 0px #000, 0 0 30px rgba(153, 69, 255, 0.6);
              z-index: 9998;
              animation: pulse 2s infinite;
              rotate: 0deg;
              transition: rotate 0.4s ease, scale 0.4s ease;
          }

          .jadgpt-chat-button:hover {
              animation: pulse-hover 2s infinite;
              rotate: -5deg;
          }

          @keyframes pulse {
              0%, 100% { scale: 1; }
              50% { scale: 1.05; }
          }

          @keyframes pulse-hover {
              0%, 100% { scale: 1.05; }
              50% { scale: 1.2; }
          }


          
      </style>
  
    <button class="jadgpt-chat-button" onclick="toggleJadGPT()" style="flex-direction: column;">
          <span style="
              display: inline-block;
              width: 35px;
              height: 35px;
              background: url('/assets/AI_pixel_head_only-DF0WD_pb.png') no-repeat center 10%;
              background-size: contain;
          "></span>
          <span style="font-size: 8px; font-family: 'Press Start 2P'; margin-top: -4px;">JadGPT</span>
    </button>


  
      <script>
          function toggleJadGPT() {
              const widget = document.getElementById('jadgpt-widget');
              const button = document.querySelector('.jadgpt-chat-button');
              
              widget.style.display = 'block';
              widget.style.pointerEvents = 'all';
              button.style.display = 'none';
              
              // Send message to iframe to open the chat
              setTimeout(() => {
                  widget.contentWindow.postMessage('openChat', '*');
              }, 50);
          }
  
          window.addEventListener('message', function(event) {
              if (event.data === 'closeChat') {
                  const widget = document.getElementById('jadgpt-widget');
                  const button = document.querySelector('.jadgpt-chat-button');
                  
                  widget.style.display = 'none';
                  widget.style.pointerEvents = 'none';
                  button.style.display = 'flex';
              }
          });
      </script>
